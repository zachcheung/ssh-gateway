name: release

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at midnight UTC

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Checkout latest tag
        if: github.event_name == 'schedule'
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          git checkout $LATEST_TAG

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            NOTES=$(sed -n "/## $TAG_NAME/,/## v[0-9]/p" RELEASE_NOTES.md | sed '$d' | tail -n +2)

            if [ -n "$NOTES" ]; then
              echo "$NOTES" > temp_notes.md
              gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes-file temp_notes.md
              rm temp_notes.md
            else
              gh release create "$TAG_NAME" --title "Release $TAG_NAME" --generate-notes
            fi
          else
            gh release create "$TAG_NAME" --title "Release $TAG_NAME" --generate-notes
          fi
