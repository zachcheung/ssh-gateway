name: test

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'examples/**'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'examples/**'

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run integration tests
        run: docker compose -f compose.test.yml up --build --abort-on-container-exit
